name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:

  # ─────────────────────────────────────
  # SCAN 1 — Gitleaks (secrets)
  # ─────────────────────────────────────
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─────────────────────────────────────
  # SCAN 2 — Semgrep (SAST)
  # ─────────────────────────────────────
  semgrep:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name : Create compliance directory
        run: mkdir -p docs/compliance

      - name: Run Semgrep
        run: |
          pip install semgrep
          semgrep scan --config auto public/ \
            --json > docs/compliance/report-sast.json || true

      - name: Upload SAST report
        uses: actions/upload-artifact@v4
        with:
          name: sast-report
          path: docs/compliance/report-sast.json

  # ─────────────────────────────────────
  # SCAN 3 — Trivy (SCA + SBOM)
  # ─────────────────────────────────────
  trivy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name : Create compliance directory
        run: mkdir -p docs/compliance

      - name: Run Trivy (vulnérabilités)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: json
          output: docs/compliance/report-sca.json

      - name: Generate SBOM
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: cyclonedx
          output: docs/compliance/sbom.json

      - name: Upload SCA + SBOM reports
        uses: actions/upload-artifact@v4
        with:
          name: sca-sbom-reports
          path: docs/compliance/

  # ─────────────────────────────────────
  # DEPLOY — seulement si tous les scans passent
  # ─────────────────────────────────────
  deploy:
    runs-on: ubuntu-latest
    needs: [gitleaks, semgrep, trivy]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to server
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} "
            cd /home/ubuntu/app &&
            git remote set-url origin https://randriamasinoro:$GH_PAT@github.com/randriamasinoro/indian.git &&
            git pull origin main &&
            docker compose down &&
            docker compose build &&
            docker compose up -d
          "

  # ─────────────────────────────────────
  # SCAN 4 — OWASP ZAP (DAST)
  # ─────────────────────────────────────
  zap:
    runs-on: ubuntu-latest
    needs: [deploy]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run OWASP ZAP
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: http://${{ secrets.SERVER_HOST }}
          rules_file_name: .zap/rules.tsv
          cmd_options: '-a'

      - name: Upload DAST report
        uses: actions/upload-artifact@v4
        with:
          name: dast-report
          path: report_html.html