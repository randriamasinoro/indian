name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 1 # On ne prend que le dernier commit pour aller VITE
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  semgrep:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
      - name: Run Semgrep
        run: |
          pip install semgrep
          semgrep scan --config auto public/

  trivy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
      - name: Run Trivy
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          format: 'table'

  build-and-push:
    runs-on: ubuntu-latest
    needs: [gitleaks, semgrep, trivy]
    # On donne explicitement le droit d'ecrire des packages
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile
          push: true
          # CORRECTION ICI : Pas de sous-dossier dans le nom du package
          tags: ghcr.io/${{ github.repository_owner }}/resto-site:latest
          platforms: linux/arm64

  deploy:
    runs-on: ubuntu-latest
    needs: [build-and-push]
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            cd /home/ubuntu/app
            # Mise a jour de l'image (doit correspondre au tag du build)
            docker pull ghcr.io/${{ github.repository_owner }}/resto-site:latest
            docker compose up -d --remove-orphans
            docker image prune -f

  zap:
    runs-on: ubuntu-latest
    needs: [deploy]
    permissions:
      issues: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
      - name: ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.15.0
        with:
          target: https://indian-food.duckdns.org
          rules_file_name: .zap/rules.tsv
          cmd_options: '-a'
      - name: Upload DAST report
        uses: actions/upload-artifact@v6
        with:
          name: dast-report
          path: report_html.html